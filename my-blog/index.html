<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Digital Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #333;
      min-height: 100vh;
    }
    
    header {
      background: linear-gradient(135deg, #6c63ff 0%, #5a52d5 100%);
      color: white;
      padding: 4rem 1rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(108, 99, 255, 0.3);
    }
    
    header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }
    
    header .tagline {
      font-size: 1.1rem;
      opacity: 0.95;
      font-weight: 300;
    }
    
    main {
      max-width: 1200px;
      margin: -2rem auto 3rem;
      padding: 0 1rem;
    }
    
    .intro {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      margin-bottom: 3rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      line-height: 1.8;
    }
    
    .intro h2 {
      color: #6c63ff;
      margin-bottom: 1rem;
      font-size: 1.4rem;
    }
    
    .projects-section h2 {
      text-align: center;
      color: #333;
      margin-bottom: 2rem;
      font-size: 2rem;
    }
    
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .contact-section {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
      margin-bottom: 2rem;
    }

    .contact-form label {
      display: block;
      margin-bottom: 0.75rem;
      color: #333;
      font-size: 0.95rem;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #e6e6ee;
      border-radius: 8px;
      margin-top: 0.35rem;
      font-size: 0.95rem;
    }

    .contact-form .note {
      font-size: 0.85rem;
      color: #666;
      margin: 0.5rem 0 1rem;
    }
    
    .project-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    
    .project-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 30px rgba(108, 99, 255, 0.2);
    }
    
    .project-header {
      background: linear-gradient(135deg, #6c63ff 0%, #5a52d5 100%);
      color: white;
      padding: 2rem;
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .project-header h3 {
      font-size: 1.3rem;
      text-align: center;
    }
    
    .project-body {
      padding: 1.5rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }
    
    .project-body p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 1rem;
      flex-grow: 1;
    }
